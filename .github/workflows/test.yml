name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # This repo is stdlib-only; pytest is the sole test dependency.
      - run: pip install pytest
      - run: pytest tests/ -v
      # quick-rules.md가 taxonomy(SSOT)에서 재생성한 것과 일치하는지 검사.
      # 손으로 고쳤거나 taxonomy 수정 후 재생성을 잊으면 여기서 막힌다.
      - run: python3 scripts/build_quick_rules.py --check
